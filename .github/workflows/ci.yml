name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ────────────────────────────────────────────────────────
          - name: linux-baseline
            os: ubuntu-latest
            cmake_flags: -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y jq clang-format gcovr

          - name: linux-gcov
            os: ubuntu-latest
            cmake_flags: >-
              -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
              -DCEEDLING_ENABLE_GCOV=ON
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y jq clang-format gcovr

          - name: linux-sanitizer
            os: ubuntu-latest
            cmake_flags: >-
              -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
              -DCEEDLING_ENABLE_SANITIZER=ON
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y jq clang-format gcovr

          - name: linux-gcov-sanitizer
            os: ubuntu-latest
            cmake_flags: >-
              -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
              -DCEEDLING_ENABLE_GCOV=ON
              -DCEEDLING_ENABLE_SANITIZER=ON
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y jq clang-format gcovr

          # ── Linux + Clang ─────────────────────────────────────────────────
          - name: linux-clang-baseline
            os: ubuntu-latest
            cmake_flags: >-
              -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y jq clang clang-format gcovr

          - name: linux-clang-gcov
            os: ubuntu-latest
            cmake_flags: >-
              -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++
              -DCEEDLING_ENABLE_GCOV=ON
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y jq clang clang-format gcovr llvm

          - name: linux-clang-sanitizer
            os: ubuntu-latest
            cmake_flags: >-
              -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++
              -DCEEDLING_ENABLE_SANITIZER=ON
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y jq clang clang-format gcovr

          - name: linux-clang-gcov-sanitizer
            os: ubuntu-latest
            cmake_flags: >-
              -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++
              -DCEEDLING_ENABLE_GCOV=ON
              -DCEEDLING_ENABLE_SANITIZER=ON
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y jq clang clang-format gcovr llvm

          # ── macOS ────────────────────────────────────────────────────────
          - name: macos-baseline
            os: macos-latest
            cmake_flags: -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
            install_deps: |
              brew install jq clang-format
              if ! command -v gcovr >/dev/null 2>&1; then
                brew install pipx
                pipx ensurepath
                pipx install gcovr
                echo "$HOME/.local/bin" >> "$GITHUB_PATH"
              fi

          - name: macos-sanitizer
            os: macos-latest
            cmake_flags: >-
              -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
              -DCEEDLING_ENABLE_SANITIZER=ON
            install_deps: |
              brew install jq clang-format
              if ! command -v gcovr >/dev/null 2>&1; then
                brew install pipx
                pipx ensurepath
                pipx install gcovr
                echo "$HOME/.local/bin" >> "$GITHUB_PATH"
              fi

          # ── Windows MSVC ─────────────────────────────────────────────────
          - name: windows-msvc-baseline
            os: windows-latest
            cmake_flags: -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
            install_deps: choco install jq -y

          - name: windows-msvc-sanitizer
            os: windows-latest
            cmake_flags: >-
              -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
              -DCEEDLING_ENABLE_SANITIZER=ON
            install_deps: choco install jq -y

          # ── Windows MinGW ────────────────────────────────────────────────
          - name: windows-mingw-baseline
            os: windows-latest
            cmake_flags: >-
              -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
              -G "MinGW Makefiles"
              -DCMAKE_C_COMPILER=gcc
              -DCMAKE_CXX_COMPILER=g++
            install_deps: |
              choco install jq -y
              pip install gcovr

          - name: windows-mingw-gcov
            os: windows-latest
            cmake_flags: >-
              -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
              -G "MinGW Makefiles"
              -DCMAKE_C_COMPILER=gcc
              -DCMAKE_CXX_COMPILER=g++
              -DCEEDLING_ENABLE_GCOV=ON
            install_deps: |
              choco install jq -y
              pip install gcovr

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: ${{ matrix.install_deps }}

      - name: Configure
        run: cmake -S . -B build ${{ matrix.cmake_flags }}

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Verify tests do not mutate source tree
        shell: pwsh
        run: |
          $dirty = git status --porcelain
          if ($dirty) {
            git status --short
            git diff
            exit 1
          }

      - name: Upload CTest log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-${{ matrix.name }}-log
          path: build/Testing/Temporary/LastTest.log
          if-no-files-found: ignore

  lint-basic:
    name: lint-basic
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure install-only project
        run: cmake -S . -B build-lint -DCMAKE_TOOLBOX_BUILD_EXAMPLES=OFF

      - name: Validate install rules
        run: cmake --install build-lint --prefix "$RUNNER_TEMP/install"
