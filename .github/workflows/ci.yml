name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-linux:
    name: test-linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq clang-format gcovr

      - name: Configure
        run: cmake -S . -B build -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Upload CTest log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-linux-log
          path: build/Testing/Temporary/LastTest.log
          if-no-files-found: ignore

  test-macos:
    name: test-macos
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install jq clang-format
          if ! brew list gcovr >/dev/null 2>&1; then
            brew install gcovr || true
          fi
          if ! command -v gcovr >/dev/null 2>&1; then
            brew install pipx
            pipx ensurepath
            pipx install gcovr
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Configure
        run: cmake -S . -B build -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build

      - name: Run core tests
        run: |
          ctest --test-dir build --output-on-failure \
            -R "policy_|clangformat_|compilecommands_|discover_tests_|gcov_|integration_"

      - name: Upload CTest log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-macos-log
          path: build/Testing/Temporary/LastTest.log
          if-no-files-found: ignore

  lint-basic:
    name: lint-basic
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure install-only project
        run: cmake -S . -B build-lint -DCMAKE_TOOLBOX_BUILD_EXAMPLES=OFF

      - name: Validate install rules
        run: cmake --install build-lint --prefix "$RUNNER_TEMP/install"
