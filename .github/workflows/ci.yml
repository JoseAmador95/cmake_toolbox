name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ────────────────────────────────────────────────────────
          - name: linux-baseline
            os: ubuntu-latest
            cmake_flags: -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y clang-format gcovr

          - name: linux-gcov
            os: ubuntu-latest
            cmake_flags: >-
              -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
              -DCMT_CEEDLING_ENABLE_GCOV=ON
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y clang-format gcovr

          - name: linux-sanitizer
            os: ubuntu-latest
            cmake_flags: >-
              -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
              -DCMT_CEEDLING_ENABLE_SANITIZER=ON
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y clang-format gcovr

          - name: linux-gcov-sanitizer
            os: ubuntu-latest
            cmake_flags: >-
              -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
              -DCMT_CEEDLING_ENABLE_GCOV=ON
              -DCMT_CEEDLING_ENABLE_SANITIZER=ON
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y clang-format gcovr

          # ── Linux + Clang ─────────────────────────────────────────────────
          - name: linux-clang-baseline
            os: ubuntu-latest
            cmake_flags: >-
              -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y clang clang-format gcovr

          - name: linux-clang-gcov
            os: ubuntu-latest
            cmake_flags: >-
              -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++
              -DCMT_CEEDLING_ENABLE_GCOV=ON
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y clang clang-format gcovr llvm

          - name: linux-clang-sanitizer
            os: ubuntu-latest
            cmake_flags: >-
              -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++
              -DCMT_CEEDLING_ENABLE_SANITIZER=ON
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y clang clang-format gcovr

          - name: linux-clang-gcov-sanitizer
            os: ubuntu-latest
            cmake_flags: >-
              -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++
              -DCMT_CEEDLING_ENABLE_GCOV=ON
              -DCMT_CEEDLING_ENABLE_SANITIZER=ON
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y clang clang-format gcovr llvm

          # ── macOS ────────────────────────────────────────────────────────
          - name: macos-baseline
            os: macos-latest
            cmake_flags: -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
            install_deps: |
              brew install clang-format
              if ! command -v gcovr >/dev/null 2>&1; then
                brew install pipx
                pipx ensurepath
                pipx install gcovr
                echo "$HOME/.local/bin" >> "$GITHUB_PATH"
              fi

          - name: macos-sanitizer
            os: macos-latest
            cmake_flags: >-
              -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
              -DCMT_CEEDLING_ENABLE_SANITIZER=ON
            install_deps: |
              brew install clang-format
              if ! command -v gcovr >/dev/null 2>&1; then
                brew install pipx
                pipx ensurepath
                pipx install gcovr
                echo "$HOME/.local/bin" >> "$GITHUB_PATH"
              fi

          # ── Windows MSVC ─────────────────────────────────────────────────
          - name: windows-msvc-baseline
            os: windows-latest
            cmake_flags: -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
            build_config: Debug
            install_deps: echo "No extra dependencies"

          - name: windows-msvc-sanitizer
            os: windows-latest
            cmake_flags: >-
              -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
              -DCMT_CEEDLING_ENABLE_SANITIZER=ON
            build_config: Debug
            install_deps: echo "No extra dependencies"

          # ── Windows MinGW ────────────────────────────────────────────────
          - name: windows-mingw-baseline
            os: windows-latest
            cmake_flags: >-
              -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
              -G "MinGW Makefiles"
              -DCMAKE_C_COMPILER=gcc
              -DCMAKE_CXX_COMPILER=g++
            install_deps: |
              pip install gcovr

          - name: windows-mingw-gcov
            os: windows-latest
            cmake_flags: >-
              -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
              -G "MinGW Makefiles"
              -DCMAKE_C_COMPILER=gcc
              -DCMAKE_CXX_COMPILER=g++
              -DCMT_CEEDLING_ENABLE_GCOV=ON
            install_deps: |
              pip install gcovr

          # ── Linux + Cppcheck ─────────────────────────────────────────────
          - name: linux-cppcheck-enabled
            os: ubuntu-latest
            cmake_flags: -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
            ctest_labels: cppcheck
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y clang-format gcovr cppcheck

          - name: linux-cppcheck-advisory
            os: ubuntu-latest
            cmake_flags: -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
            ctest_labels: cppcheck
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y clang-format gcovr

          # ── Linux + IWYU ──────────────────────────────────────────────────
          - name: linux-iwyu-enabled
            os: ubuntu-latest
            cmake_flags: -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
            ctest_labels: iwyu
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y clang-format gcovr iwyu

          - name: linux-iwyu-advisory
            os: ubuntu-latest
            cmake_flags: -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
            ctest_labels: iwyu
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y clang-format gcovr

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: ${{ matrix.install_deps }}

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Add MSVC ASan runtime to PATH
        if: matrix.name == 'windows-msvc-sanitizer'
        shell: pwsh
        run: |
          $programFilesX86 = ${Env:ProgramFiles(x86)}
          if (-not $programFilesX86) {
            $programFilesX86 = $Env:ProgramFiles
          }
          $vswhere = Join-Path $programFilesX86 "Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            $vswhere = (Get-Command vswhere.exe -ErrorAction SilentlyContinue).Source
          }
          if ($vswhere) {
            $vsPath = & $vswhere -latest -products * -property installationPath
          }
          if ($vsPath) {
            $asanDll = Get-ChildItem -Path "$vsPath\VC\Tools\Llvm" -Recurse -Filter "clang_rt.asan*_dynamic-x86_64.dll" | Select-Object -First 1
            if (-not $asanDll) {
              $asanDll = Get-ChildItem -Path "$vsPath\VC\Tools\MSVC" -Recurse -Filter "clang_rt.asan*_dynamic-x86_64.dll" | Select-Object -First 1
            }
            if (-not $asanDll) {
              $asanDll = Get-ChildItem -Path "$vsPath\VC\Tools\Llvm" -Recurse -Filter "clang_rt.asan*_dynamic*.dll" | Select-Object -First 1
            }
            if (-not $asanDll) {
              $asanDll = Get-ChildItem -Path "$vsPath\VC\Tools\MSVC" -Recurse -Filter "clang_rt.asan*_dynamic*.dll" | Select-Object -First 1
            }
            if ($asanDll) {
              $asanDir = $asanDll.Directory.FullName
              "$asanDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            }
          }

      - name: Configure
        run: cmake -S . -B build ${{ matrix.cmake_flags }}

      - name: Build
        run: cmake --build build ${{ matrix.build_config && format('--config {0}', matrix.build_config) || '' }}

      - name: Diagnostics for MSVC ASan
        if: matrix.name == 'windows-msvc-sanitizer'
        shell: pwsh
        run: |
          Write-Host "ProgramFiles(x86): ${Env:ProgramFiles(x86)}"
          Write-Host "ProgramFiles: $Env:ProgramFiles"
          $programFilesX86 = ${Env:ProgramFiles(x86)}
          if (-not $programFilesX86) {
            $programFilesX86 = $Env:ProgramFiles
          }
          $vswhere = Join-Path $programFilesX86 "Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            $vswhere = (Get-Command vswhere.exe -ErrorAction SilentlyContinue).Source
          }
          Write-Host "vswhere: $vswhere"
          if ($vswhere) {
            $vsPath = & $vswhere -latest -products * -property installationPath
          }
          if ($vsPath) {
            Write-Host "VS install: $vsPath"
            $asanDlls = Get-ChildItem -Path "$vsPath\VC\Tools" -Recurse -Filter "clang_rt.asan*_dynamic*.dll"
            Write-Host "Found ASan DLLs: $($asanDlls.Count)"
            $asanDlls | Select-Object -First 10 | ForEach-Object { Write-Host $_.FullName }

            $dumpbin = Get-ChildItem -Path "$vsPath\VC\Tools\MSVC" -Recurse -Filter "dumpbin.exe" | Select-Object -First 1
            if ($dumpbin) {
              Write-Host "dumpbin: $($dumpbin.FullName)"
              $exampleTest = Get-ChildItem -Path "build" -Recurse -Filter "example_test.exe" | Select-Object -First 1
              if ($exampleTest) {
                Write-Host "example_test: $($exampleTest.FullName)"
                & $dumpbin.FullName /dependents $exampleTest.FullName
              } else {
                Write-Host "example_test.exe not found in build"
              }
            } else {
              Write-Host "dumpbin.exe not found"
            }
          } else {
            Write-Host "VS install not found"
          }

      - name: Run tests
        run: ctest --test-dir build --output-on-failure ${{ matrix.ctest_labels && format('-L {0}', matrix.ctest_labels) || '' }} ${{ matrix.build_config && format('-C {0}', matrix.build_config) || '' }} -j

      - name: Verify tests do not mutate source tree
        shell: pwsh
        run: |
          $dirty = git status --porcelain
          if ($dirty) {
            git status --short
            git diff
            exit 1
          }

      - name: Upload CTest log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-${{ matrix.name }}-log
          path: build/Testing/Temporary/LastTest.log
          if-no-files-found: ignore

  lint-basic:
    name: lint-basic
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure install-only project
        run: cmake -S . -B build-lint -DCMAKE_TOOLBOX_BUILD_EXAMPLES=OFF

      - name: Validate install rules
        run: cmake --install build-lint --prefix "$RUNNER_TEMP/install"

  clang-tools-versions:
    name: clang-tools-${{ matrix.clang_version }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        clang_version: [13, 16, 18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lsb-release wget gnupg software-properties-common ninja-build

      - name: Install LLVM tools
        run: |
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh ${{ matrix.clang_version }} all

      - name: Configure
        run: >-
          cmake -S . -B build
          -G "Ninja"
          -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
          -DClangFormat_EXECUTABLE=/usr/bin/clang-format-${{ matrix.clang_version }}
          -DCLANG_TIDY_EXECUTABLE=/usr/bin/clang-tidy-${{ matrix.clang_version }}

      - name: Build
        run: cmake --build build

      - name: Run clang tools tests
        run: ctest --test-dir build --output-on-failure -L "clangformat|clangtidy" -j

  generator-matrix:
    name: generator-${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-ninja
            os: ubuntu-latest
            generator: Ninja
            build_config: ""
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y ninja-build
          - label: linux-makefiles
            os: ubuntu-latest
            generator: Unix Makefiles
            build_config: ""
            install_deps: |
              echo "No extra deps"
          - label: linux-ninja-multi
            os: ubuntu-latest
            generator: Ninja Multi-Config
            build_config: Debug
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y ninja-build
          - label: macos-ninja
            os: macos-latest
            generator: Ninja
            build_config: ""
            install_deps: |
              brew install ninja
          - label: macos-makefiles
            os: macos-latest
            generator: Unix Makefiles
            build_config: ""
            install_deps: |
              echo "No extra deps"
          - label: macos-ninja-multi
            os: macos-latest
            generator: Ninja Multi-Config
            build_config: Debug
            install_deps: |
              brew install ninja
          - label: macos-xcode
            os: macos-latest
            generator: Xcode
            build_config: Debug
            install_deps: |
              echo "No extra deps"
          - label: windows-ninja
            os: windows-latest
            generator: Ninja
            build_config: ""
            install_deps: |
              choco install ninja -y
          - label: windows-ninja-multi
            os: windows-latest
            generator: Ninja Multi-Config
            build_config: Debug
            install_deps: |
              choco install ninja -y
          - label: windows-vs2026
            os: windows-latest
            generator: Visual Studio 18 2026
            build_config: Debug
            install_deps: |
              echo "No extra deps"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: ${{ matrix.install_deps }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake -S . -B build -G "${{ matrix.generator }}" -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build ${{ matrix.build_config && format('--config {0}', matrix.build_config) || '' }}

      - name: Run generator coverage tests
        run: ctest --test-dir build --output-on-failure -L "ceedling|unity|findunity|gcov|sanitizer" -j ${{ matrix.build_config && format('-C {0}', matrix.build_config) || '' }}

  unity-cmock-versions:
    name: unity-cmock-${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: unity-2.6.1-cmock-2.6.0
            unity_tag: v2.6.1
            cmock_tag: v2.6.0
          - label: unity-2.5.2-cmock-2.5.2
            unity_tag: v2.5.2
            cmock_tag: v2.5.2
          - label: unity-2.4.3-cmock-2.4.3
            unity_tag: v2.4.3
            cmock_tag: v2.4.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"

      - name: Configure
        run: >-
          cmake -S . -B build
          -G "Ninja"
          -DCMAKE_TOOLBOX_BUILD_EXAMPLES=ON
          -DCMT_UNITY_GIT_TAG=${{ matrix.unity_tag }}
          -DCMT_CMOCK_GIT_TAG=${{ matrix.cmock_tag }}

      - name: Build
        run: cmake --build build

      - name: Run Unity/CMock tests
        run: ctest --test-dir build --output-on-failure -L "ceedling|unity|findunity" -j

  gcovr-versions:
    name: gcovr-${{ matrix.gcovr_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gcovr_version: ["5.0", "6.0", "7.2", "8.0"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install gcovr
        run: |
          python -m pip install --user --upgrade pip
          python -m pip install --user "gcovr==${{ matrix.gcovr_version }}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          gcovr --version

      - name: Run gcovr schema test
        run: >-
          cmake
          -DCMT_GCOVR_EXECUTABLE="$(command -v gcovr)"
          -DCMAKE_TOOLBOX_TEST_ARTIFACTS_ROOT="$RUNNER_TEMP/test_artifacts"
          -P unit_tests/gcovrschema/test_real_gcovr.cmake
